name: Build Desktop App (Python Backend + Tauri Frontend)

on:
  push:
    tags:
      - 'v*' # 发布 tag 时触发
  workflow_dispatch:
jobs:
  build:
    strategy:
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync backend dependencies
        shell: bash
        run: |
          uv sync --project backend --frozen

      - name: Build backend bundle
        shell: bash
        run: |

          if [ "$RUNNER_OS" = "Windows" ]; then
            backend\\build.bat
          else
            chmod +x backend/build.sh
            ./backend/build.sh
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: BillNote_frontend/pnpm-lock.yaml

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Enable Corepack + Install pnpm
        working-directory: BillNote_frontend
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri App
        working-directory: BillNote_frontend
        run: pnpm tauri build

      - name: Upload Desktop Bundle
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.platform }}
          path: BillNote_frontend/src-tauri/target/release/bundle/
